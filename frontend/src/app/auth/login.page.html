<ion-header>
  <ion-toolbar>
    <ion-title>タスク管理</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <!-- ログイン / 新規登録 の切り替え -->
  <ion-segment [value]="mode()" (ionChange)="setMode($any($event.detail.value))">
    <ion-segment-button value="login">
      <ion-label>ログイン</ion-label>
    </ion-segment-button>
    <ion-segment-button value="register">
      <ion-label>新規登録</ion-label>
    </ion-segment-button>
  </ion-segment>

  <!-- [formGroup] で Reactive Forms と接続 -->
  <form [formGroup]="form" (ngSubmit)="submit()">
    <ion-item>
      <ion-input
        label="ユーザー名"
        labelPlacement="floating"
        formControlName="username"
        autocomplete="username"
      ></ion-input>
    </ion-item>
    <ion-item>
      <ion-input
        type="password"
        label="パスワード（8文字以上）"
        labelPlacement="floating"
        formControlName="password"
        autocomplete="current-password"
      ></ion-input>
    </ion-item>

    <!-- @if は Angular 17+ の新しい制御フロー（旧 *ngIf の置き換え）-->
    @if (error()) {
      <ion-text color="danger">
        <p>{{ error() }}</p>
      </ion-text>
    }

    <ion-button
      type="submit"
      expand="block"
      class="ion-margin-top"
      [disabled]="loading()"
    >
      {{ mode() === 'register' ? '登録してはじめる' : 'ログイン' }}
    </ion-button>
  </form>
</ion-content>
